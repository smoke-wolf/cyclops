<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYCLOPS — Investigation</title>
<style>
:root {
    --bg-0: #08090d; --bg-1: #0f1117; --bg-2: #181a22; --bg-3: #1e2130;
    --text-0: #f0f3f8; --text-1: #a0a8b8; --text-2: #6b7280;
    --accent: #e74c3c; --accent-dim: rgba(231,76,60,0.12);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444; --blue: #3b82f6; --purple: #a78bfa; --cyan: #06b6d4;
    --border: rgba(255,255,255,0.06); --radius: 6px;
    --mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-0); color: var(--text-0); font-family: var(--mono); font-size: 13px; line-height: 1.6; padding: 24px; max-width: 1400px; margin: 0 auto; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.logo { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.breadcrumb { color: var(--text-2); font-size: 12px; }
h1 { font-size: 18px; font-weight: 600; }
h2 { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin: 24px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.meta { color: var(--text-2); font-size: 11px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.12); color: var(--blue); }
.badge-purple { background: rgba(167,139,250,0.12); color: var(--purple); }
.badge-cyan { background: rgba(6,182,212,0.12); color: var(--cyan); }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-2); letter-spacing: 0.1em; margin-top: 4px; }

.actions { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.btn { padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); cursor: pointer; font-family: var(--mono); font-size: 11px; text-transform: uppercase; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
.btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); text-decoration: none; }
.btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.2); }
.btn-danger:hover { background: var(--red); color: #fff; }

.tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.tab { padding: 8px 16px; color: var(--text-2); cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: var(--text-0); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge { background: var(--accent-dim); color: var(--accent); padding: 1px 5px; border-radius: 8px; font-size: 9px; margin-left: 4px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
th { text-align: left; padding: 6px 10px; background: var(--bg-2); color: var(--text-2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-weight: 500; }
td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text-1); font-size: 11px; }
tr:hover td { background: var(--bg-1); }

/* Entity search */
.entity-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.entity-toolbar input { width: 250px; padding: 6px 10px; font-size: 12px; }
.entity-toolbar select { width: 140px; padding: 6px 10px; font-size: 11px; }
input, select { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-0); font-family: var(--mono); outline: none; }
input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-2); }

.entity-group { margin-bottom: 16px; }
.entity-group-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 0; user-select: none; }
.entity-group-header:hover { opacity: 0.8; }
.entity-group-header .count { color: var(--text-2); font-size: 11px; }
.entity-group-header .chevron { color: var(--text-2); font-size: 10px; transition: transform 0.15s; }
.entity-group-header .chevron.open { transform: rotate(90deg); }
.entity-card { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; margin: 4px 0; font-size: 11px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.entity-card .field { color: var(--text-2); margin-right: 8px; }
.entity-card .field span { color: var(--text-1); }
.confidence-bar { display: inline-block; width: 50px; height: 4px; background: var(--bg-3); border-radius: 2px; vertical-align: middle; flex-shrink: 0; }
.confidence-fill { height: 100%; border-radius: 2px; }
.conf-label { font-size: 10px; font-weight: 600; flex-shrink: 0; width: 30px; }

.phase-timeline { display: flex; flex-direction: column; gap: 8px; }
.phase-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); }
.phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.phase-name { font-weight: 500; flex: 1; }
.phase-meta { color: var(--text-2); font-size: 11px; display: flex; gap: 12px; }
.phase-connector { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; background: var(--bg-2); color: var(--text-2); margin: 1px; }

.auto-refresh-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--cyan); }
.auto-refresh-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
</style>
</head>
<body>
<div class="topbar">
    <a href="/" class="logo">CYCLOPS</a>
    <span class="breadcrumb">/ <a href="/">Dashboard</a> / Investigation</span>
</div>
<h1 id="inv-name">Loading...</h1>
<div class="meta">
    <span class="badge" id="inv-status"></span>
    <span id="inv-workflow"></span>
    <span id="inv-time"></span>
    <span id="inv-id" style="font-size:10px"></span>
    <span class="auto-refresh-indicator" id="auto-refresh" style="display:none"><span class="auto-refresh-dot"></span> live</span>
</div>

<div class="stat-grid" id="stats-grid"></div>

<div class="actions">
    <a class="btn" id="btn-graph" href="#">Entity Graph</a>
    <a class="btn" id="btn-report-html" href="#" target="_blank">HTML Report</a>
    <a class="btn" id="btn-report-json" href="#" target="_blank">JSON Report</a>
    <a class="btn" id="btn-report-md" href="#" target="_blank">MD Report</a>
    <button class="btn btn-danger" id="btn-abort" style="display:none" onclick="abortInv()">Abort</button>
</div>

<div class="tabs">
    <div class="tab active" data-tab="entities">Entities <span class="tab-badge" id="entity-count">0</span></div>
    <div class="tab" data-tab="phases">Phases</div>
    <div class="tab" data-tab="connectors">Connectors</div>
    <div class="tab" data-tab="knowns">Knowns</div>
</div>

<div class="tab-content active" id="tab-entities">
    <div class="entity-toolbar">
        <input type="text" id="entity-search" placeholder="Search entities..." oninput="filterEntities()">
        <select id="entity-type-filter" onchange="filterEntities()">
            <option value="">All Types</option>
        </select>
        <select id="entity-sort" onchange="filterEntities()">
            <option value="confidence">By Confidence</option>
            <option value="sources">By Sources</option>
            <option value="type">By Type</option>
        </select>
        <span style="color:var(--text-2);font-size:10px;margin-left:auto" id="entity-showing"></span>
    </div>
    <div id="entity-list"></div>
</div>
<div class="tab-content" id="tab-phases"></div>
<div class="tab-content" id="tab-connectors"></div>
<div class="tab-content" id="tab-knowns"></div>

<script>
const id = new URLSearchParams(window.location.search).get('id');
if (!id) { document.body.innerHTML = '<p style="padding:40px">No investigation ID specified. <a href="/">Back to Dashboard</a></p>'; }

let allEntities = [];
let refreshInterval = null;

const COLORS = {
    person: '#e74c3c', account: '#3b82f6', email: '#22c55e', domain: '#f59e0b',
    subdomain: '#d97706', ip: '#06b6d4', repository: '#a78bfa', breach: '#ef4444',
    phone: '#ec4899', url: '#64748b', dns_record: '#475569', technology: '#f97316',
    organization: '#14b8a6', certificate: '#8b5cf6', port: '#6366f1',
    credential: '#dc2626', vulnerability: '#b91c1c', service: '#818cf8'
};

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
});

async function load() {
    try {
        const [statusRes, entRes, knownsRes] = await Promise.all([
            fetch(`/api/investigation/${id}`),
            fetch(`/api/investigation/${id}/entities`),
            fetch(`/api/investigation/${id}/knowns`)
        ]);
        const data = await statusRes.json();
        allEntities = await entRes.json();
        const knowns = await knownsRes.json();
        const inv = data.investigation;

        if (!inv) {
            document.body.innerHTML = '<p style="padding:40px">Investigation not found. <a href="/">Back</a></p>';
            return;
        }

        document.title = `CYCLOPS — ${inv.name}`;
        document.getElementById('inv-name').textContent = inv.name;
        const statusClass = inv.status === 'completed' ? 'green' : inv.status === 'running' ? 'amber' : inv.status === 'failed' ? 'red' : 'blue';
        document.getElementById('inv-status').className = `badge badge-${statusClass}`;
        document.getElementById('inv-status').textContent = inv.status;
        document.getElementById('inv-workflow').textContent = inv.workflow;
        document.getElementById('inv-time').textContent = inv.created_at;
        document.getElementById('inv-id').textContent = `ID: ${inv.id}`;

        if (inv.status === 'running') {
            document.getElementById('auto-refresh').style.display = '';
            document.getElementById('btn-abort').style.display = '';
            if (!refreshInterval) refreshInterval = setInterval(load, 5000);
        } else {
            document.getElementById('auto-refresh').style.display = 'none';
            document.getElementById('btn-abort').style.display = 'none';
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
        }

        document.getElementById('btn-graph').href = `/graph.html?id=${id}`;
        document.getElementById('btn-report-html').href = `/api/investigation/${id}/report?format=html`;
        document.getElementById('btn-report-json').href = `/api/investigation/${id}/report?format=json`;
        document.getElementById('btn-report-md').href = `/api/investigation/${id}/report?format=markdown`;

        const entityTotal = data.stats.entities.reduce((s, e) => s + e.count, 0);
        const highConf = allEntities.filter(e => e.confidence >= 0.8).length;
        const multiSource = allEntities.filter(e => e.source_count > 1).length;
        document.getElementById('stats-grid').innerHTML = `
            <div class="stat"><div class="stat-value">${entityTotal}</div><div class="stat-label">Entities</div></div>
            <div class="stat"><div class="stat-value">${data.stats.links}</div><div class="stat-label">Links</div></div>
            <div class="stat"><div class="stat-value">${data.stats.entities.length}</div><div class="stat-label">Types</div></div>
            <div class="stat"><div class="stat-value" style="color:var(--green)">${highConf}</div><div class="stat-label">High Conf</div></div>
            <div class="stat"><div class="stat-value" style="color:var(--amber)">${multiSource}</div><div class="stat-label">Multi-Source</div></div>
            <div class="stat"><div class="stat-value">${data.stats.phases.length}</div><div class="stat-label">Phases</div></div>
        `;

        document.getElementById('entity-count').textContent = entityTotal;

        // Populate type filter
        const typeFilter = document.getElementById('entity-type-filter');
        const currentType = typeFilter.value;
        const types = [...new Set(allEntities.map(e => e.type))].sort();
        typeFilter.innerHTML = '<option value="">All Types</option>' + types.map(t => `<option value="${t}">${t} (${allEntities.filter(e => e.type === t).length})</option>`).join('');
        typeFilter.value = currentType;

        filterEntities();
        renderPhases(data.stats);
        renderConnectors(data.stats);
        renderKnowns(knowns);
    } catch (e) {
        console.error('Load failed:', e);
    }
}

function filterEntities() {
    const search = document.getElementById('entity-search').value.toLowerCase();
    const typeFilter = document.getElementById('entity-type-filter').value;
    const sort = document.getElementById('entity-sort').value;

    let filtered = allEntities;
    if (search) {
        filtered = filtered.filter(e => {
            const dataStr = JSON.stringify(e.data || {}).toLowerCase();
            return e.type.includes(search) || dataStr.includes(search);
        });
    }
    if (typeFilter) filtered = filtered.filter(e => e.type === typeFilter);

    if (sort === 'confidence') filtered.sort((a, b) => b.confidence - a.confidence);
    else if (sort === 'sources') filtered.sort((a, b) => (b.source_count || 0) - (a.source_count || 0));

    document.getElementById('entity-showing').textContent = `${filtered.length} of ${allEntities.length}`;

    if (sort === 'type' || (!search && !typeFilter && sort === 'confidence')) {
        renderGroupedEntities(filtered);
    } else {
        renderFlatEntities(filtered);
    }
}

function renderGroupedEntities(entities) {
    const grouped = {};
    for (const e of entities) {
        if (!grouped[e.type]) grouped[e.type] = [];
        grouped[e.type].push(e);
    }

    let html = '';
    for (const [type, items] of Object.entries(grouped).sort((a, b) => b[1].length - a[1].length)) {
        const color = COLORS[type] || '#666';
        items.sort((a, b) => b.confidence - a.confidence);
        html += `<div class="entity-group">`;
        html += `<div class="entity-group-header" onclick="toggleGroup(this)">`;
        html += `<span class="chevron open">▸</span>`;
        html += `<span class="badge" style="background:${color}22;color:${color}">${type}</span>`;
        html += `<span class="count">${items.length}</span></div>`;
        html += `<div class="entity-group-items" style="display:${items.length <= 30 ? 'block' : 'none'}">`;
        for (const e of items.slice(0, 200)) html += renderEntityCard(e);
        if (items.length > 200) html += `<div style="color:var(--text-2);padding:8px;font-size:11px">... and ${items.length - 200} more</div>`;
        html += `</div></div>`;
    }
    document.getElementById('entity-list').innerHTML = html || '<div style="color:var(--text-2);padding:24px;text-align:center">No entities match filters</div>';
}

function renderFlatEntities(entities) {
    let html = '';
    for (const e of entities.slice(0, 300)) html += renderEntityCard(e);
    if (entities.length > 300) html += `<div style="color:var(--text-2);padding:8px;font-size:11px">... and ${entities.length - 300} more</div>`;
    document.getElementById('entity-list').innerHTML = html || '<div style="color:var(--text-2);padding:24px;text-align:center">No entities match filters</div>';
}

function renderEntityCard(e) {
    const conf = e.confidence * 100;
    const confColor = conf >= 80 ? 'var(--green)' : conf >= 50 ? 'var(--amber)' : 'var(--red)';
    const color = COLORS[e.type] || '#666';
    let card = `<div class="entity-card">`;
    card += `<span class="confidence-bar"><span class="confidence-fill" style="width:${conf}%;background:${confColor}"></span></span>`;
    card += `<span class="conf-label" style="color:${confColor}">${conf.toFixed(0)}%</span>`;
    card += `<span class="badge" style="background:${color}22;color:${color};font-size:9px;padding:1px 5px">${e.type}</span>`;
    for (const [k, v] of Object.entries(e.data || {})) {
        if (v !== null && v !== undefined && typeof v !== 'object') {
            card += `<span class="field">${k}: <span>${String(v).slice(0, 80)}</span></span>`;
        }
    }
    if (e.source_count > 1) card += `<span class="badge badge-amber" style="font-size:9px">${e.source_count} sources</span>`;
    card += `</div>`;
    return card;
}

function toggleGroup(header) {
    const items = header.nextElementSibling;
    const chevron = header.querySelector('.chevron');
    if (items.style.display === 'none') {
        items.style.display = 'block';
        chevron.classList.add('open');
    } else {
        items.style.display = 'none';
        chevron.classList.remove('open');
    }
}

function renderPhases(stats) {
    let html = '<div class="phase-timeline">';
    for (const p of stats.phases) {
        const color = p.status === 'completed' ? 'var(--green)' : p.status === 'running' ? 'var(--amber)' : p.status === 'failed' ? 'var(--red)' : 'var(--bg-3)';
        const delta = (p.entities_after || 0) - (p.entities_before || 0);
        html += `<div class="phase-item">`;
        html += `<div class="phase-dot" style="background:${color}${p.status === 'running' ? ';animation:pulse 1.5s infinite' : ''}"></div>`;
        html += `<div class="phase-name">${p.phase_id}</div>`;
        html += `<div class="phase-meta">`;
        html += `<span class="badge badge-${p.status === 'completed' ? 'green' : p.status === 'running' ? 'amber' : p.status === 'failed' ? 'red' : 'blue'}">${p.status}</span>`;
        if (delta > 0) html += `<span style="color:var(--green)">+${delta} entities</span>`;
        html += `</div></div>`;
    }
    html += '</div>';
    document.getElementById('tab-phases').innerHTML = html;
}

function renderConnectors(stats) {
    const connGrouped = {};
    for (const c of stats.connectors) {
        if (!connGrouped[c.connector]) connGrouped[c.connector] = { completed: 0, failed: 0, timeout: 0, running: 0 };
        connGrouped[c.connector][c.status] = (connGrouped[c.connector][c.status] || 0) + c.count;
    }
    let html = '<table><thead><tr><th>Connector</th><th>Completed</th><th>Failed</th><th>Timeout</th></tr></thead><tbody>';
    for (const [name, s] of Object.entries(connGrouped).sort((a, b) => (b[1].completed || 0) - (a[1].completed || 0))) {
        html += `<tr>`;
        html += `<td>${name}</td>`;
        html += `<td>${s.completed ? `<span class="badge badge-green">${s.completed}</span>` : '<span style="color:var(--text-2)">0</span>'}</td>`;
        html += `<td>${s.failed ? `<span class="badge badge-red">${s.failed}</span>` : '<span style="color:var(--text-2)">0</span>'}</td>`;
        html += `<td>${s.timeout ? `<span class="badge badge-amber">${s.timeout}</span>` : '<span style="color:var(--text-2)">0</span>'}</td>`;
        html += `</tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('tab-connectors').innerHTML = html;
}

function renderKnowns(knowns) {
    if (!knowns || !knowns.length) {
        document.getElementById('tab-knowns').innerHTML = '<div style="color:var(--text-2);padding:24px;text-align:center">No knowns data</div>';
        return;
    }
    let html = '<table><thead><tr><th>Type</th><th>Value</th></tr></thead><tbody>';
    for (const k of knowns) {
        html += `<tr><td><span class="badge badge-cyan">${k.type}</span></td><td>${k.value}</td></tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('tab-knowns').innerHTML = html;
}

async function abortInv() {
    try {
        await fetch(`/api/investigation/${id}/abort`, { method: 'POST' });
        document.getElementById('inv-status').className = 'badge badge-red';
        document.getElementById('inv-status').textContent = 'aborting';
    } catch {}
}

if (id) load();
</script>
</body>
</html>
