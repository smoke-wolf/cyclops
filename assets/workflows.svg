<text y="290"><tspan x="20" fill="#c9d1d9" font-weight="normal">    </tspan><tspan x="58.4" fill="#6e7681" font-weight="normal">Accepts:</tspan><tspan x="135.2" fill="#c9d1d9" font-weight="normal"> </tspan><tspan x="144.79999999999998" fill="#a5d6ff" font-weight="normal">domain</tspan><tspan x="202.39999999999998" fill="#c9d1d9" font-weight="normal"> </tspan><tspan x="211.99999999999997" fill="#a5d6ff" font-weight="normal">ip</tspan><tspan x="231.19999999999996" fill="#c9d1d9" font-weight="normal"> </tspan><tspan x="240.79999999999995" fill="#a5d6ff" font-weight="normal">subdomain</tspan><tspan x="327.19999999999993" fill="#c9d1d9" font-weight="normal"> </tspan><tspan x="336.79999999999995" fill="#a5d6ff" font-weight="normal">email</tspan></text>
