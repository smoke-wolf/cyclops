<text y="370"><tspan x="20" fill="#c9d1d9" font-weight="normal">    </tspan><tspan x="58.4" fill="#6e7681" font-weight="normal">5 phases:</tspan><tspan x="144.79999999999998" fill="#c9d1d9" font-weight="normal"> Platform Search → Profile Data Extraction → Identity Pivot → Entity Correlation → Report Generation</tspan></text>
