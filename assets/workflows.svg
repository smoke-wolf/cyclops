<text y="130"><tspan x="20" fill="#c9d1d9" font-weight="normal">  </tspan><tspan x="39.2" fill="#ff7b72" font-weight="normal">▸</tspan><tspan x="48.800000000000004" fill="#c9d1d9" font-weight="normal"> </tspan><tspan x="58.400000000000006" fill="#c9d1d9" font-weight="bold">person_full</tspan></text>
<text y="150"><tspan x="20" fill="#c9d1d9" font-weight="normal">    Complete OSINT profile from any known person identifiers</tspan></text>
<text y="170"><tspan x="20" fill="#c9d1d9" font-weight="normal">    </tspan><tspan x="58.4" fill="#6e7681" font-weight="normal">6 phases:</tspan><tspan x="144.79999999999998" fill="#c9d1d9" font-weight="normal"> Seed Expansion → Breach &amp; Credential Check → Infrastructure Mapping → Deep Profiling → Entity Correlation → Report Generation</tspan></text>
