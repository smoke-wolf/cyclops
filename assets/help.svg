<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="666" viewBox="0 0 1000 666">
<defs><style>text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', Menlo, monospace; font-size: 14px; }</style></defs>
<rect width="1000" height="666" rx="10" fill="#0d1117"/>
<rect width="1000" height="36" rx="10" fill="#161b22"/>
<rect x="0" y="26" width="1000" height="10" fill="#161b22"/>
<circle cx="20" cy="18" r="6" fill="#ff5f57"/>
<circle cx="40" cy="18" r="6" fill="#febc2e"/>
<circle cx="60" cy="18" r="6" fill="#28c840"/>
<text x="500" y="22" fill="#6e7681" text-anchor="middle" font-size="13">cyclops — help</text>
<text y="70"><tspan x="20" fill="#c9d1d9" font-weight="normal">$ </tspan><tspan x="39.2" fill="#c9d1d9" font-weight="bold">cyclops --help</tspan></text>
<text y="90"></text>
<text y="110"><tspan x="20" fill="#c9d1d9" font-weight="normal">Usage: cyclops [options] [command] [target]</tspan></text>
<text y="130"><tspan x="20" fill="#c9d1d9" font-weight="normal">Unified OSINT targeting pipeline</tspan></text>
<text y="150"><tspan x="20" fill="#c9d1d9" font-weight="normal">Arguments:</tspan></text>
<text y="170"><tspan x="20" fill="#c9d1d9" font-weight="normal">  target                          Target to investigate (auto-detects type)</tspan></text>
<text y="190"><tspan x="20" fill="#c9d1d9" font-weight="normal">Options:</tspan></text>
<text y="210"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -V, --version                   output the version number</tspan></text>
<text y="230"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -t, --type &lt;type&gt;               Override input type (username, email, domain,</tspan></text>
<text y="250"><tspan x="20" fill="#c9d1d9" font-weight="normal">                                  ip, url, phone)</tspan></text>
<text y="270"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -w, --workflow &lt;workflow&gt;       Override workflow</tspan></text>
<text y="290"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -k, --known &lt;knowns...&gt;         Extra knowns (type:value)</tspan></text>
<text y="310"><tspan x="20" fill="#c9d1d9" font-weight="normal">  --format &lt;format&gt;               Report format (default: &quot;json&quot;)</tspan></text>
<text y="330"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -q, --quiet                     Minimal output</tspan></text>
<text y="350"><tspan x="20" fill="#c9d1d9" font-weight="normal">  -h, --help                      display help for command</tspan></text>
<text y="370"><tspan x="20" fill="#c9d1d9" font-weight="normal">Commands:</tspan></text>
<text y="390"><tspan x="20" fill="#c9d1d9" font-weight="normal">  investigate [options] &lt;target&gt;  Launch a new investigation</tspan></text>
<text y="410"><tspan x="20" fill="#c9d1d9" font-weight="normal">  list [options]                  List investigations</tspan></text>
<text y="430"><tspan x="20" fill="#c9d1d9" font-weight="normal">  status &lt;id&gt;                     Show investigation status</tspan></text>
<text y="450"><tspan x="20" fill="#c9d1d9" font-weight="normal">  entities [options] &lt;id&gt;         Browse entities from an investigation</tspan></text>
<text y="470"><tspan x="20" fill="#c9d1d9" font-weight="normal">  graph [options] &lt;id&gt;            Print entity link graph to terminal</tspan></text>
<text y="490"><tspan x="20" fill="#c9d1d9" font-weight="normal">  report [options] &lt;id&gt;           Generate report for investigation</tspan></text>
<text y="510"><tspan x="20" fill="#c9d1d9" font-weight="normal">  connectors [options]            List and check connectors</tspan></text>
<text y="530"><tspan x="20" fill="#c9d1d9" font-weight="normal">  workflows                       List available workflows</tspan></text>
<text y="550"><tspan x="20" fill="#c9d1d9" font-weight="normal">  purge [options] [id]            Delete an investigation (or all with --all)</tspan></text>
<text y="570"><tspan x="20" fill="#c9d1d9" font-weight="normal">  export [options] &lt;id&gt;           Export investigation data</tspan></text>
<text y="590"><tspan x="20" fill="#c9d1d9" font-weight="normal">  serve [options]                 Start the dashboard server</tspan></text>
<text y="610"></text>
</svg>